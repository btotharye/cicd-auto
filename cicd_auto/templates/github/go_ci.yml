name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["{{ go_versions | join('", "') }}"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: {% raw %}${{ matrix.go-version }}{% endraw %}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: {% raw %}${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ runner.os }}-go-{% endraw %}

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "{{ go_versions[0] }}"

      - name: Build
        env:
          GOOS: {% raw %}${{ matrix.os }}{% endraw %}
          GOARCH: {% raw %}${{ matrix.arch }}{% endraw %}
        run: go build -o app-{% raw %}${{ matrix.os }}-${{ matrix.arch }}{% endraw %} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-{% raw %}${{ matrix.os }}-${{ matrix.arch }}{% endraw %}
          path: app-*
          retention-days: 7
