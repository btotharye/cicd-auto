name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "{{ go_versions[0] }}"

      - name: Build
        env:
          GOOS: {% raw %}${{ matrix.os }}{% endraw %}
          GOARCH: {% raw %}${{ matrix.arch }}{% endraw %}
        run: |
          VERSION=$(git describe --tags --always)
          go build -ldflags "-X main.Version=$VERSION" -o app-{% raw %}${{ matrix.os }}-${{ matrix.arch }}{% endraw %} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-{% raw %}${{ matrix.os }}-${{ matrix.arch }}{% endraw %}
          path: app-*
          retention-days: 7

  release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/build-*/; do
            cp "$dir"/* release/
          done
          cd release && sha256sum * > SHA256SUMS && cd ..

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v3
        with:
          github-token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
          git-user-email: 41898282+github-actions[bot]@users.noreply.github.com
          git-user-name: github-actions[bot]
          skip-version-file: true
          skip-commit: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            ## Checksums
            ```
            {% raw %}${{ hashFiles('release/SHA256SUMS') }}{% endraw %}
            ```
            
            ## Changelog
            {% raw %}${{ steps.changelog.outputs.clean_changelog }}{% endraw %}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

  publish-docker:
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/{% raw %}${{ github.repository }}{% endraw %}
          tags: |
            type=ref,event=tag
            type=semver,pattern={% raw %}{{version}}{% endraw %}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: {% raw %}${{ steps.meta.outputs.tags }}{% endraw %}
          labels: {% raw %}${{ steps.meta.outputs.labels }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha,mode=max
