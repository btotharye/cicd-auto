name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/{% raw %}${{ github.repository }}{% endraw %}
          tags: |
            type=ref,event=branch
            type=semver,pattern={% raw %}{{version}}{% endraw %}
            type=sha,prefix={% raw %}{{branch}}-{% endraw %}
            type=raw,value=latest,enable={% raw %}{{is_default_branch}}{% endraw %}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: {% raw %}${{ github.event_name != 'pull_request' }}{% endraw %}
          tags: {% raw %}${{ steps.meta.outputs.tags }}{% endraw %}
          labels: {% raw %}${{ steps.meta.outputs.labels }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v3
        with:
          github-token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
          git-user-email: 41898282+github-actions[bot]@users.noreply.github.com
          git-user-name: github-actions[bot]
          skip-version-file: true
          skip-commit: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: {% raw %}${{ steps.changelog.outputs.clean_changelog }}{% endraw %}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

  notify:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Slack (optional)
        run: echo "Deployment complete. Update Slack webhook in secrets if needed."
