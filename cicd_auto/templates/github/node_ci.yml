name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["{{ node_versions | join('", "') }}"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: {% raw %}${{ matrix.node-version }}{% endraw %}

{%- if package_manager == "pnpm" %}
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> {% raw %}$GITHUB_OUTPUT{% endraw %}

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: {% raw %}${{ steps.pnpm-cache.outputs.STORE_PATH }}{% endraw %}
          key: {% raw %}${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ runner.os }}-pnpm-store-{% endraw %}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test --coverage

{%- elif package_manager == "yarn" %}
      - name: Setup cache
        uses: actions/setup-node@v3
        with:
          node-version: {% raw %}${{ matrix.node-version }}{% endraw %}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Test
        run: yarn test --coverage

{%- else %}
      - name: Setup cache
        uses: actions/setup-node@v3
        with:
          node-version: {% raw %}${{ matrix.node-version }}{% endraw %}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test -- --coverage

{%- endif %}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "{{ node_versions[0] }}"
{%- if package_manager == "pnpm" %}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
{%- elif package_manager == "yarn" %}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
{%- else %}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
{%- endif %}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: dist/
          retention-days: 7
