stages:
  - lint
  - test
  - build
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_VIRTUALENVS_PATH: "$CI_PROJECT_DIR/.cache/poetry"

cache:
  paths:
    - .cache/pip
    - .cache/poetry

lint:
{%- if package_manager == "uv" %}
  image: python:{{ python_versions[0] }}
  stage: lint
  before_script:
    - pip install uv
    - uv sync --all-extras
  script:
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run mypy .
  allow_failure: false
{%- elif package_manager == "poetry" %}
  image: python:{{ python_versions[0] }}
  stage: lint
  before_script:
    - pip install poetry
    - poetry install --with dev
  script:
    - poetry run ruff check .
    - poetry run ruff format --check .
    - poetry run mypy .
  allow_failure: false
{%- else %}
  image: python:{{ python_versions[0] }}
  stage: lint
  before_script:
    - pip install --upgrade pip ruff mypy
  script:
    - ruff check .
    - ruff format --check .
    - mypy .
  allow_failure: false
{%- endif %}

test:
  image: python:{{ python_versions[0] }}
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: {{ python_versions | join(', ') }}
  image: python:${PYTHON_VERSION}
{%- if package_manager == "uv" %}
  before_script:
    - pip install uv
    - uv sync --all-extras
  script:
    - uv run pytest --cov=. --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
{%- elif package_manager == "poetry" %}
  before_script:
    - pip install poetry
    - poetry install --with dev
  script:
    - poetry run pytest --cov=. --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
{%- else %}
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
{%- endif %}

security:
  image: python:{{ python_versions[0] }}
  stage: security
{%- if package_manager == "uv" %}
  before_script:
    - pip install uv
    - uv sync --all-extras
  script:
    - uv run bandit -r . -ll -f json -o bandit-report.json || true
    - uv run pip-audit --desc --format json || true
{%- elif package_manager == "poetry" %}
  before_script:
    - pip install poetry
    - poetry install --with dev
  script:
    - poetry run bandit -r . -ll -f json -o bandit-report.json || true
    - poetry run pip-audit --desc --format json || true
{%- else %}
  before_script:
    - pip install bandit pip-audit
  script:
    - bandit -r . -ll -f json -o bandit-report.json || true
    - pip-audit --desc --format json || true
{%- endif %}
  allow_failure: true
  artifacts:
    reports:
      sast: bandit-report.json
