name: 'Auto CI/CD Generator'
description: 'Auto-generate production-ready CI/CD pipelines for any project'
author: 'btotharye'

inputs:
  platforms:
    description: 'Target platforms (github,gitlab,jenkins,buildkite,circleci)'
    required: false
    default: 'github'
  create-pr:
    description: 'Create a pull request with generated workflows'
    required: false
    default: 'true'
  branch-name:
    description: 'Branch name for pull request'
    required: false
    default: 'feat/auto-cicd'
  commit-message:
    description: 'Commit message for changes'
    required: false
    default: 'ci: auto-generate CI/CD workflows'
  pr-title:
    description: 'Pull request title'
    required: false
    default: 'ci: auto-generate CI/CD workflows'
  pr-body:
    description: 'Pull request body/description'
    required: false
    default: 'Auto-generated CI/CD configuration via cicd-auto'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  generated-files:
    description: 'Comma-separated list of generated files'
    value: ${{ steps.generate.outputs.files }}
  pr-url:
    description: 'URL of created pull request (if create-pr=true)'
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  pr-number:
    description: 'Number of created pull request (if create-pr=true)'
    value: ${{ steps.create-pr.outputs.pull-request-number }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      shell: bash

    - name: Install cicd-auto
      run: uv pip install --system cicd-auto
      shell: bash

    - name: Analyze project
      id: analyze
      run: |
        cicd-auto analyze --json > /tmp/analysis.json
        echo "Analysis:"
        cat /tmp/analysis.json
      shell: bash

    - name: Generate workflows
      id: generate
      run: |
        PLATFORMS="${{ inputs.platforms }}"
        PLATFORM_ARGS=""
        for platform in ${PLATFORMS//,/ }; do
          PLATFORM_ARGS="$PLATFORM_ARGS --platform $platform"
        done
        
        echo "Generating for platforms: $PLATFORMS"
        cicd-auto generate $PLATFORM_ARGS
        
        # Collect generated files
        GENERATED_FILES=""
        if [ -d ".github/workflows" ]; then
          GENERATED_FILES="$GENERATED_FILES $(find .github/workflows -type f -name '*.yml' | tr '\n' ',')"
        fi
        if [ -f ".gitlab-ci.yml" ]; then
          GENERATED_FILES="$GENERATED_FILES .gitlab-ci.yml,"
        fi
        if [ -f ".github/dependabot.yml" ]; then
          GENERATED_FILES="$GENERATED_FILES .github/dependabot.yml,"
        fi
        if [ -f ".pre-commit-config.yaml" ]; then
          GENERATED_FILES="$GENERATED_FILES .pre-commit-config.yaml,"
        fi
        if [ -f "Jenkinsfile" ]; then
          GENERATED_FILES="$GENERATED_FILES Jenkinsfile,"
        fi
        if [ -f ".buildkite/pipeline.yml" ]; then
          GENERATED_FILES="$GENERATED_FILES .buildkite/pipeline.yml,"
        fi
        
        # Remove trailing comma
        GENERATED_FILES="${GENERATED_FILES%,}"
        echo "files=$GENERATED_FILES" >> $GITHUB_OUTPUT
      shell: bash

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet; then
          echo "has-changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          git diff --stat
        fi
      shell: bash

    - name: Create pull request
      id: create-pr
      if: steps.changes.outputs.has-changes == 'true' && inputs.create-pr == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        commit-message: ${{ inputs.commit-message }}
        title: ${{ inputs.pr-title }}
        body: |
          ${{ inputs.pr-body }}
          
          ## Generated Files
          ${{ steps.generate.outputs.files }}
          
          ## How to Use
          1. Review the changes
          2. Make any necessary adjustments
          3. Merge when ready
          
          ---
          Generated by [cicd-auto](https://github.com/btotharye/cicd-auto)
        branch: ${{ inputs.branch-name }}
        delete-branch: true
        labels: 'ci/cd,auto-generated'

    - name: Comment on PR
      if: steps.changes.outputs.has-changes == 'true' && inputs.create-pr == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: ${{ steps.create-pr.outputs.pull-request-number }},
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ CI/CD workflows have been auto-generated by [cicd-auto](https://github.com/btotharye/cicd-auto)\n\nReview the changes and merge when ready.'
          })

    - name: Summary
      if: always()
      run: |
        echo "## cicd-auto Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Action completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated Files:**" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.generate.outputs.files }}" | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.create-pr.outputs.pull-request-number }}" != "" ]; then
          echo "**Pull Request:** #${{ steps.create-pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash
